  <text x="380" y="175" text-anchor="middle" fill="#71717A" font-size="9">18</text>

  <!-- W6: 24 → h=105 -->
  <rect x="424" y="155" width="44" height="105" rx="4" fill="url(#barGrad)" opacity="0.7"/>
  <text x="446" y="273" text-anchor="middle" fill="#71717A" font-size="8">W6</text>
  <text x="446" y="149" text-anchor="middle" fill="#71717A" font-size="9">24</text>

  <!-- W7: 30 → h=132 (PagerDuty plugin) -->
  <rect x="490" y="128" width="44" height="132" rx="4" fill="url(#barGrad)" opacity="0.8"/>
  <text x="512" y="273" text-anchor="middle" fill="#A1A1AA" font-size="8">W7</text>
  <line x1="512" y1="122" x2="512" y2="95" stroke="#A78BFA" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="524" y="92" fill="#A78BFA" font-size="8">PagerDuty plugin</text>
  <text x="512" y="122" text-anchor="middle" fill="#A1A1AA" font-size="9">30</text>

  <!-- W8: 35 → h=154 -->
  <rect x="556" y="106" width="44" height="154" rx="4" fill="url(#barGrad)" opacity="0.9"/>
  <text x="578" y="273" text-anchor="middle" fill="#A1A1AA" font-size="8">W8</text>
  <text x="578" y="100" text-anchor="middle" fill="#A1A1AA" font-size="9">35</text>

  <!-- W9: 38 → h=167 -->
  <rect x="622" y="93" width="44" height="167" rx="4" fill="url(#barGrad)"/>
  <text x="644" y="273" text-anchor="middle" fill="#FAFAFA" font-size="8">W9</text>
  <text x="644" y="87" text-anchor="middle" fill="#FAFAFA" font-size="9">38</text>

  <!-- W10: 42 → h=185 -->
  <rect x="688" y="75" width="44" height="185" rx="4" fill="url(#barGrad)"/>
  <text x="710" y="273" text-anchor="middle" fill="#FAFAFA" font-size="8">W10</text>
  <text x="710" y="69" text-anchor="middle" fill="#3B82F6" font-size="10" font-weight="bold">42</text>

