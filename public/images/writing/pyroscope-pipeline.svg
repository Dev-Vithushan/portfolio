<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">
  <rect width="800" height="320" fill="#0D0D0F" rx="16"/>
  <!-- grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1A1E" stroke-width="1"/>
    </pattern>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
  </defs>
  <rect width="800" height="320" fill="url(#grid)" rx="16" opacity="0.4"/>

  <!-- label top -->
  <text x="400" y="32" text-anchor="middle" fill="#52525B" font-size="11" letter-spacing="2">PROFILING PIPELINE</text>

  <!-- Node: Services -->
  <rect x="40" y="100" width="140" height="120" rx="12" fill="#111115" stroke="#27272A" stroke-width="1.5"/>
  <rect x="40" y="100" width="140" height="3" rx="2" fill="url(#blue)" opacity="0.7"/>
  <text x="110" y="135" text-anchor="middle" fill="#3B82F6" font-size="10" letter-spacing="1">SERVICES</text>
  <text x="110" y="158" text-anchor="middle" fill="#71717A" font-size="10">.NET</text>
  <text x="110" y="175" text-anchor="middle" fill="#71717A" font-size="10">Node.js</text>
  <text x="110" y="192" text-anchor="middle" fill="#71717A" font-size="10">Go</text>
  <circle cx="110" cy="208" r="3" fill="#22C55E" opacity="0.8"/>
  <text x="120" y="212" fill="#52525B" font-size="9">20+ services</text>

  <!-- Arrow 1 -->
  <line x1="185" y1="160" x2="225" y2="160" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="205" y="150" text-anchor="middle" fill="#52525B" font-size="9">pprof/eBPF</text>

  <!-- Node: Alloy -->
  <rect x="230" y="100" width="140" height="120" rx="12" fill="#111115" stroke="#27272A" stroke-width="1.5"/>
  <rect x="230" y="100" width="140" height="3" rx="2" fill="url(#blue)" opacity="0.7"/>
  <text x="300" y="135" text-anchor="middle" fill="#3B82F6" font-size="10" letter-spacing="1">GRAFANA ALLOY</text>
  <text x="300" y="158" text-anchor="middle" fill="#71717A" font-size="10">Collect</text>
  <text x="300" y="175" text-anchor="middle" fill="#71717A" font-size="10">Batch (30s)</text>
  <text x="300" y="192" text-anchor="middle" fill="#71717A" font-size="10">Auth header</text>
  <rect x="250" y="202" width="100" height="10" rx="5" fill="#1A1A1E"/>
  <rect x="250" y="202" width="75" height="10" rx="5" fill="#3B82F6" opacity="0.5"/>

  <!-- Arrow 2 -->
  <line x1="375" y1="160" x2="415" y2="160" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="395" y="150" text-anchor="middle" fill="#52525B" font-size="9">HTTPS+JWT</text>

  <!-- Node: Pyroscope -->
  <rect x="420" y="100" width="140" height="120" rx="12" fill="#111115" stroke="#3B82F6" stroke-width="1.5" opacity="0.9"/>
  <rect x="420" y="100" width="140" height="3" rx="2" fill="url(#blue)"/>
  <text x="490" y="135" text-anchor="middle" fill="#3B82F6" font-size="10" letter-spacing="1">PYROSCOPE</text>
  <text x="490" y="158" text-anchor="middle" fill="#A1A1AA" font-size="10">Store profiles</text>
  <text x="490" y="175" text-anchor="middle" fill="#71717A" font-size="10">S3 retention</text>
  <text x="490" y="192" text-anchor="middle" fill="#71717A" font-size="10">7d → custom</text>
  <circle cx="490" cy="210" r="5" fill="none" stroke="#3B82F6" stroke-width="1.5"/>
  <circle cx="490" cy="210" r="2" fill="#3B82F6"/>

  <!-- Arrow 3 -->
  <line x1="565" y1="160" x2="605" y2="160" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="585" y="150" text-anchor="middle" fill="#52525B" font-size="9">query</text>

  <!-- Node: Grafana -->
  <rect x="610" y="100" width="150" height="120" rx="12" fill="#111115" stroke="#27272A" stroke-width="1.5"/>
  <rect x="610" y="100" width="150" height="3" rx="2" fill="url(#blue)" opacity="0.7"/>
  <text x="685" y="135" text-anchor="middle" fill="#3B82F6" font-size="10" letter-spacing="1">GRAFANA</text>
  <text x="685" y="158" text-anchor="middle" fill="#71717A" font-size="10">Flame graphs</text>
  <text x="685" y="175" text-anchor="middle" fill="#71717A" font-size="10">Trace links</text>
  <text x="685" y="192" text-anchor="middle" fill="#71717A" font-size="10">LLM explain</text>
  <text x="685" y="210" fill="#22C55E" text-anchor="middle" font-size="9">● live</text>

  <!-- bottom labels -->
  <text x="110" y="290" text-anchor="middle" fill="#3B82F6" font-size="9" opacity="0.6">Kong JWT auth</text>
  <text x="400" y="290" text-anchor="middle" fill="#52525B" font-size="9">Kubernetes — FluxCD managed</text>
</svg>
