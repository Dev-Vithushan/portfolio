<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">
  <rect width="800" height="320" fill="#0D0D0F" rx="16"/>
  <defs>
    <pattern id="g5" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1A1E" stroke-width="1"/>
    </pattern>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="barFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#27272A"/>
      <stop offset="100%" stop-color="#1C1C1E"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" fill="url(#g5)" rx="16" opacity="0.4"/>

  <text x="400" y="30" text-anchor="middle" fill="#52525B" font-size="11" letter-spacing="2">BACKSTAGE WEEKLY ACTIVE USERS — 10 WEEK JOURNEY</text>

  <!-- Y axis -->
  <line x1="80" y1="55" x2="80" y2="260" stroke="#27272A" stroke-width="1"/>
  <!-- X axis -->
  <line x1="80" y1="260" x2="760" y2="260" stroke="#27272A" stroke-width="1"/>

  <!-- Y labels -->
  <text x="68" y="260" text-anchor="end" fill="#52525B" font-size="9">0</text>
  <text x="68" y="216" text-anchor="end" fill="#52525B" font-size="9">10</text>
  <text x="68" y="172" text-anchor="end" fill="#52525B" font-size="9">20</text>
  <text x="68" y="128" text-anchor="end" fill="#52525B" font-size="9">30</text>
  <text x="68" y="84" text-anchor="end" fill="#52525B" font-size="9">40</text>
  <!-- Y gridlines -->
  <line x1="80" y1="216" x2="760" y2="216" stroke="#1C1C1E" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="172" x2="760" y2="172" stroke="#1C1C1E" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="128" x2="760" y2="128" stroke="#1C1C1E" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="84" x2="760" y2="84" stroke="#1C1C1E" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bars: WAU data: 8,9,10,12,18,24,30,35,38,42 -->
  <!-- bar width=44, gap=22, start x=94 -->
  <!-- max=40 → scale: (val/40)*176 = height, y=260-height -->

  <!-- W1: 8 → h=35 -->
  <rect x="94" y="225" width="44" height="35" rx="4" fill="url(#barFade)"/>
  <text x="116" y="273" text-anchor="middle" fill="#52525B" font-size="8">W1</text>
  <text x="116" y="219" text-anchor="middle" fill="#52525B" font-size="9">8</text>

  <!-- W2: 9 → h=39 -->
  <rect x="160" y="221" width="44" height="39" rx="4" fill="url(#barFade)"/>
  <text x="182" y="273" text-anchor="middle" fill="#52525B" font-size="8">W2</text>
  <text x="182" y="215" text-anchor="middle" fill="#52525B" font-size="9">9</text>

  <!-- W3: 10 → h=44 -->
  <rect x="226" y="216" width="44" height="44" rx="4" fill="url(#barFade)"/>
  <text x="248" y="273" text-anchor="middle" fill="#52525B" font-size="8">W3</text>
  <!-- annotation: catalog enforcement -->
  <line x1="248" y1="210" x2="248" y2="185" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,3"/>
