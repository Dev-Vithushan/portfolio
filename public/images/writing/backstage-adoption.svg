  <text x="314" y="201" text-anchor="middle" fill="#52525B" font-size="9">12</text>

  <!-- W5: 18 → h=79 (new templates shipped) -->
  <rect x="358" y="181" width="44" height="79" rx="4" fill="url(#barGrad)" opacity="0.6"/>
  <text x="380" y="273" text-anchor="middle" fill="#71717A" font-size="8">W5</text>
  <!-- annotation -->
  <line x1="380" y1="175" x2="380" y2="148" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3,3"/>
