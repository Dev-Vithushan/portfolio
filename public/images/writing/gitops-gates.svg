<svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">
  <rect width="800" height="300" fill="#0D0D0F" rx="16"/>
  <defs>
    <pattern id="g4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1A1E" stroke-width="1"/>
    </pattern>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22C55E"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#EF4444"/>
    </marker>
    <linearGradient id="bl4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#g4)" rx="16" opacity="0.4"/>
  <text x="400" y="30" text-anchor="middle" fill="#52525B" font-size="11" letter-spacing="2">GITOPS RELEASE GATE PIPELINE</text>

  <!-- Step 1: Git Push -->
  <rect x="20" y="100" width="110" height="70" rx="10" fill="#111115" stroke="#27272A" stroke-width="1.5"/>
  <text x="75" y="128" text-anchor="middle" fill="#A1A1AA" font-size="10" font-weight="bold">Git Push</text>
  <text x="75" y="145" text-anchor="middle" fill="#52525B" font-size="9">main branch</text>
  <text x="75" y="160" text-anchor="middle" fill="#3B82F6" font-size="9">PR merged</text>

  <line x1="133" y1="135" x2="158" y2="135" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: FluxCD -->
  <rect x="162" y="100" width="120" height="70" rx="10" fill="#111115" stroke="#27272A" stroke-width="1.5"/>
  <text x="222" y="128" text-anchor="middle" fill="#A1A1AA" font-size="10" font-weight="bold">FluxCD</text>
  <text x="222" y="145" text-anchor="middle" fill="#52525B" font-size="9">Reconcile</text>
  <text x="222" y="160" text-anchor="middle" fill="#52525B" font-size="9">Kustomization</text>

  <line x1="285" y1="135" x2="310" y2="135" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Deploy -->
  <rect x="314" y="100" width="120" height="70" rx="10" fill="#111115" stroke="#27272A" stroke-width="1.5"/>
  <text x="374" y="128" text-anchor="middle" fill="#A1A1AA" font-size="10" font-weight="bold">Deploy</text>
  <text x="374" y="145" text-anchor="middle" fill="#52525B" font-size="9">Rolling update</text>
  <text x="374" y="160" text-anchor="middle" fill="#52525B" font-size="9">+60s wait</text>

  <line x1="437" y1="135" x2="462" y2="135" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Health Gate -->
  <rect x="466" y="88" width="130" height="94" rx="10" fill="#0F1A2E" stroke="#3B82F6" stroke-width="2"/>
  <rect x="466" y="88" width="130" height="3" rx="2" fill="url(#bl4)"/>
  <text x="531" y="115" text-anchor="middle" fill="#3B82F6" font-size="10" font-weight="bold">HEALTH GATE</text>
  <text x="531" y="132" text-anchor="middle" fill="#71717A" font-size="9">error rate Δ &lt;5%</text>
  <text x="531" y="147" text-anchor="middle" fill="#71717A" font-size="9">p95 latency shift</text>
  <text x="531" y="162" text-anchor="middle" fill="#71717A" font-size="9">saturation check</text>
  <!-- bake window label -->
  <text x="531" y="176" text-anchor="middle" fill="#52525B" font-size="8">10 min bake window</text>

  <!-- Pass path -->
  <line x1="598" y1="118" x2="648" y2="118" stroke="#22C55E" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <text x="622" y="110" text-anchor="middle" fill="#22C55E" font-size="9">PASS</text>
  <rect x="652" y="100" width="110" height="70" rx="10" fill="#111115" stroke="#22C55E" stroke-width="1.5" opacity="0.8"/>
  <text x="707" y="128" text-anchor="middle" fill="#22C55E" font-size="10" font-weight="bold">✓ Live</text>
  <text x="707" y="145" text-anchor="middle" fill="#52525B" font-size="9">Grafana link</text>
  <text x="707" y="160" text-anchor="middle" fill="#52525B" font-size="9">in alert msg</text>

  <!-- Fail path -->
  <line x1="531" y1="182" x2="531" y2="228" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrRed)" stroke-dasharray="4,3"/>
  <text x="540" y="215" fill="#EF4444" font-size="9">FAIL</text>
  <rect x="390" y="232" width="280" height="50" rx="10" fill="#1A0D0D" stroke="#EF4444" stroke-width="1.5" opacity="0.8"/>
  <text x="530" y="254" text-anchor="middle" fill="#EF4444" font-size="10">Suspend Kustomization</text>
  <text x="530" y="271" text-anchor="middle" fill="#71717A" font-size="9">Alert → engineer decides: rollback / hotfix / override</text>
</svg>
