<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Mono, monospace">
  <rect width="800" height="340" fill="#0D0D0F" rx="16"/>
  <defs>
    <pattern id="g3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A1A1E" stroke-width="1"/>
    </pattern>
    <linearGradient id="hot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="warm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
    <linearGradient id="cool" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="340" fill="url(#g3)" rx="16" opacity="0.4"/>
  <text x="400" y="32" text-anchor="middle" fill="#52525B" font-size="11" letter-spacing="2">FLAME GRAPH — CPU PROFILE</text>

  <!-- Flame graph bars (bottom = root, top = leaves) -->
  <!-- Row 1 - root -->
  <rect x="40" y="258" width="720" height="22" rx="4" fill="#1E2030" stroke="#27272A" stroke-width="1"/>
  <text x="400" y="273" text-anchor="middle" fill="#71717A" font-size="10">runtime.main (100%)</text>

  <!-- Row 2 -->
  <rect x="40" y="232" width="520" height="22" rx="4" fill="#1A2535" stroke="#27272A" stroke-width="1"/>
  <text x="300" y="247" text-anchor="middle" fill="#71717A" font-size="10">http.ServeHTTP (72%)</text>
  <rect x="566" y="232" width="194" height="22" rx="4" fill="#111115" stroke="#27272A" stroke-width="1"/>
  <text x="663" y="247" text-anchor="middle" fill="#52525B" font-size="10">other (27%)</text>

  <!-- Row 3 -->
  <rect x="40" y="206" width="390" height="22" rx="4" fill="url(#warm)" opacity="0.25" stroke="#F59E0B" stroke-width="1"/>
  <text x="235" y="221" text-anchor="middle" fill="#F59E0B" font-size="10">middleware.Auth (54%)</text>
  <rect x="436" y="206" width="124" height="22" rx="4" fill="#111115" stroke="#27272A" stroke-width="1"/>
  <text x="498" y="221" text-anchor="middle" fill="#52525B" font-size="10">handler (17%)</text>

  <!-- Row 4 -->
  <rect x="40" y="180" width="310" height="22" rx="4" fill="url(#hot)" opacity="0.3" stroke="#EF4444" stroke-width="1"/>
  <text x="195" y="195" text-anchor="middle" fill="#EF4444" font-size="10">jwt.ParseToken (43%) ◀ HOT</text>
  <rect x="356" y="180" width="74" height="22" rx="4" fill="#111115" stroke="#27272A" stroke-width="1"/>
  <text x="393" y="195" text-anchor="middle" fill="#52525B" font-size="9">db (10%)</text>

  <!-- Row 5 -->
  <rect x="40" y="154" width="220" height="22" rx="4" fill="url(#hot)" opacity="0.4" stroke="#EF4444" stroke-width="1.5"/>
  <text x="150" y="169" text-anchor="middle" fill="#FCA5A5" font-size="10">crypto/rsa.Verify (30%)</text>
  <rect x="266" y="154" width="84" height="22" rx="4" fill="url(#warm)" opacity="0.2" stroke="#F59E0B" stroke-width="1"/>
  <text x="308" y="169" text-anchor="middle" fill="#F59E0B" font-size="9">base64 (12%)</text>

  <!-- Row 6 -->
  <rect x="40" y="128" width="150" height="22" rx="4" fill="url(#hot)" opacity="0.5" stroke="#EF4444" stroke-width="1.5"/>
  <text x="115" y="143" text-anchor="middle" fill="#FCA5A5" font-size="10">big.Int.Exp (20%)</text>
  <rect x="196" y="128" width="64" height="22" rx="4" fill="#111115" stroke="#27272A" stroke-width="1"/>
  <text x="228" y="143" text-anchor="middle" fill="#52525B" font-size="9">alloc (9%)</text>

  <!-- LLM callout box -->
  <rect x="440" y="110" width="320" height="100" rx="10" fill="#0F1A2E" stroke="#3B82F6" stroke-width="1.5" opacity="0.95"/>
  <rect x="440" y="110" width="320" height="3" rx="2" fill="#3B82F6"/>
  <text x="456" y="130" fill="#3B82F6" font-size="9" letter-spacing="1">✦ LLM ANALYSIS</text>
  <text x="456" y="148" fill="#A1A1AA" font-size="9">Hot path: RSA signature verify on every</text>
  <text x="456" y="163" fill="#A1A1AA" font-size="9">request. No caching detected.</text>
  <text x="456" y="183" fill="#71717A" font-size="9">→ Add token cache keyed by JTI claim</text>
  <text x="456" y="198" fill="#71717A" font-size="9">→ Expected CPU reduction: ~25–30%</text>

  <!-- legend -->
  <rect x="40" y="296" width="12" height="12" rx="2" fill="url(#hot)" opacity="0.6"/>
  <text x="58" y="307" fill="#71717A" font-size="9">Hot (&gt;20%)</text>
  <rect x="130" y="296" width="12" height="12" rx="2" fill="url(#warm)" opacity="0.6"/>
  <text x="148" y="307" fill="#71717A" font-size="9">Warm (10–20%)</text>
  <rect x="240" y="296" width="12" height="12" rx="2" fill="#1E2030"/>
  <text x="258" y="307" fill="#71717A" font-size="9">Cool (&lt;10%)</text>
</svg>
